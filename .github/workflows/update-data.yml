name: 每日更新台股期貨籌碼資料

on:
  schedule:
    # GitHub Actions 排程為 UTC，台北時間 = UTC+8
    - cron: "40 7 * * 1-5"   # 台北 15:40（三大法人/大額交易人約15:30公布）
    - cron: "0 9 * * 1-5"    # 台北 17:00（備援一）
    - cron: "0 12 * * 1-5"   # 台北 20:00（備援二，TAIFEX開放資料常在晚間更新）
    - cron: "0 23 * * 1-5"   # 台北隔日 07:00（最終備援，確保開放資料已完成更新）
  workflow_dispatch: {}       # 允許手動執行

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 取出原始碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝套件
        run: pip install -r scripts/requirements.txt

      - name: 抓取資料
        run: python scripts/fetch_data.py

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "資料沒有變化，不需要 commit"
          else
            git commit -m "自動更新籌碼資料 $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
